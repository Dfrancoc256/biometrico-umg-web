# ============================================================
# UMG Sistema Biometrico Web — Configuracion
# Universidad Mariano Galvez — Sede La Florida, Zona 19
# ============================================================

# Puerto del servidor (cambiar si hay conflicto)
server.port=8080

# ── BASE DE DATOS ───────────────────────────────────────────
# Cambiar estos valores con los datos de su PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/biometrico_umg
spring.datasource.username=postgres
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — 'validate' verifica el esquema, 'update' lo ajusta automaticamente
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# ── THYMELEAF ───────────────────────────────────────────────
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ── ARCHIVOS (fotos) ────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── CORREO ELECTRONICO (Gmail) ──────────────────────────────
# Requiere contrasena de aplicacion Gmail (no la contrasena normal)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── WHATSAPP (CallMeBot) ────────────────────────────────────
# Enviar 'I allow callmebot to send me messages' al +34 644 82 93 46
whatsapp.callmebot.apikey=
whatsapp.callmebot.url=https://api.callmebot.com/whatsapp.php

# ── ALMACENAMIENTO ──────────────────────────────────────────
almacenamiento.fotos=fotos_personas
almacenamiento.carnets=carnets
almacenamiento.reportes=reportes

# ── RECONOCIMIENTO FACIAL ───────────────────────────────────
facial.umbral.similitud=0.83
facial.tamano.parche=64

# ── LOGS ────────────────────────────────────────────────────
logging.level.umg.biometrico=INFO
logging.level.org.springframework.security=WARN