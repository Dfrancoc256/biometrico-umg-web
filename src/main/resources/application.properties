# ============================================================
# UMG Sistema Biometrico Web — Configuracion de la Aplicacion
# ============================================================

# Puerto del servidor web (cambiar si hay conflicto)
server.port=8080
server.servlet.context-path=/

# Nombre de la aplicacion
spring.application.name=UMG-Biometrico-Web

# ============================================================
# BASE DE DATOS PostgreSQL
# Editar estos valores con sus datos reales
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/biometrico_umg
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexiones
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# CORREO ELECTRONICO (Gmail)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================================
# THYMELEAF
# ============================================================
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ============================================================
# SUBIDA DE ARCHIVOS (fotos)
# ============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# WEBSOCKET
# ============================================================
spring.websocket.path=/ws

# ============================================================
# WHATSAPP CallMeBot
# ============================================================
whatsapp.callmebot.apikey=
whatsapp.callmebot.url=https://api.callmebot.com/whatsapp.php

# ============================================================
# RUTAS DE ALMACENAMIENTO
# ============================================================
almacenamiento.fotos=fotos_personas
almacenamiento.carnets=carnets
almacenamiento.reportes=reportes

# ============================================================
# RECONOCIMIENTO FACIAL
# ============================================================
facial.umbral.similitud=0.83
facial.tamano.parche=64

# ============================================================
# LOGGING
# ============================================================
logging.level.umg.biometrico=INFO
logging.level.org.springframework.security=WARN
logging.file.name=logs/biometrico-web.log
