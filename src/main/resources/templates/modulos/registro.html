<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Registro Biográfico — UMG Biométrico</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}"/>
</head>
<body>

<nav th:replace="~{fragmentos/base :: navegacion}"></nav>

<main class="contenedor-principal">
    <div th:replace="~{fragmentos/base :: alertas}"></div>

    <div class="pagina-encabezado">
        <h2 class="pagina-titulo">
            <span class="pagina-titulo__icono">👤</span>
            Proceso 1 — Registro Biográfico / Biométrico
        </h2>
        <a th:href="@{/registro/lista}" class="btn btn--secundario">Ver Lista</a>
    </div>

    <form th:action="@{/registro}" method="post" th:object="${persona}"
          enctype="multipart/form-data" class="formulario-registro" novalidate>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="formulario-fila">

            <!-- PANEL IZQUIERDO: Datos biográficos -->
            <div class="formulario-panel">
                <h3 class="formulario-panel__titulo">Datos Biográficos</h3>

                <div class="campo">
                    <label class="campo__etiqueta" for="carnet">Número de Carnet *</label>
                    <input type="text" id="carnet" th:field="*{carnet}"
                           class="campo__entrada" placeholder="Ej. 2024-001" required/>
                    <span class="campo__error" th:errors="*{carnet}"></span>
                </div>

                <div class="campo-doble">
                    <div class="campo">
                        <label class="campo__etiqueta" for="nombres">Nombres *</label>
                        <input type="text" id="nombres" th:field="*{nombres}"
                               class="campo__entrada" required/>
                        <span class="campo__error" th:errors="*{nombres}"></span>
                    </div>
                    <div class="campo">
                        <label class="campo__etiqueta" for="apellidos">Apellidos *</label>
                        <input type="text" id="apellidos" th:field="*{apellidos}"
                               class="campo__entrada" required/>
                        <span class="campo__error" th:errors="*{apellidos}"></span>
                    </div>
                </div>

                <div class="campo">
                    <label class="campo__etiqueta" for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" th:field="*{correo}"
                           class="campo__entrada" placeholder="ejemplo@umg.edu.gt"/>
                    <span class="campo__error" th:errors="*{correo}"></span>
                </div>

                <div class="campo-doble">
                    <div class="campo">
                        <label class="campo__etiqueta" for="telefono">Teléfono</label>
                        <input type="tel" id="telefono" th:field="*{telefono}"
                               class="campo__entrada" placeholder="5022-0000"/>
                    </div>
                    <div class="campo">
                        <label class="campo__etiqueta" for="fechaNacimiento">Fecha de Nacimiento</label>
                        <input type="date" id="fechaNacimiento" th:field="*{fechaNacimiento}"
                               class="campo__entrada"/>
                    </div>
                </div>

                <div class="campo">
                    <label class="campo__etiqueta" for="tipoPersona">Tipo de Persona *</label>
                    <select id="tipoPersona" th:field="*{tipoPersona}" class="campo__entrada">
                        <option th:each="tipo : ${tiposPersona}"
                                th:value="${tipo}"
                                th:text="${tipo.etiqueta}">Tipo</option>
                    </select>
                </div>

                <div class="campo">
                    <label class="campo__etiqueta" for="contrasena">Contraseña *</label>
                    <input type="password" id="contrasena" name="contrasena"
                           class="campo__entrada" required minlength="6"/>
                    <small class="campo__ayuda">Mínimo 6 caracteres</small>
                </div>
            </div>

            <!-- PANEL DERECHO: Foto y biométrico -->
            <div class="formulario-panel">
                <h3 class="formulario-panel__titulo">Datos Biométricos</h3>

                <!-- Vista previa de foto -->
                <div class="foto-preview" id="contenedorFoto">
                    <img id="imgPreview" src="" alt="Foto" class="foto-preview__imagen" style="display:none"/>
                    <div id="fotoPlaceholder" class="foto-preview__placeholder">
                        <span>📷</span>
                        <p>Sin foto</p>
                    </div>
                </div>

                <!-- Opciones de foto -->
                <div class="foto-opciones">
                    <label class="btn btn--secundario btn--pequeno" for="foto">
                        📁 Cargar Archivo
                    </label>
                    <input type="file" id="foto" name="foto" accept="image/*"
                           class="campo__oculto" onchange="previsualizarFoto(this)"/>
                    <button type="button" class="btn btn--secundario btn--pequeno"
                            onclick="activarCamara()">
                        📷 Usar Cámara
                    </button>
                </div>

                <!-- Captura desde cámara -->
                <div id="seccionCamara" class="camara-seccion" style="display:none">
                    <video id="videoStream" class="camara-video" autoplay playsinline></video>
                    <canvas id="canvasCaptura" style="display:none"></canvas>
                    <div class="camara-controles">
                        <button type="button" class="btn btn--primario btn--pequeno"
                                onclick="capturarFoto()">📸 Capturar</button>
                        <button type="button" class="btn btn--secundario btn--pequeno"
                                onclick="detenerCamara()">✕ Cerrar</button>
                    </div>
                </div>

                <!-- Encoding facial (oculto, llenado por JS) -->
                <input type="hidden" id="encodingFacialBase64" name="encodingFacialBase64"/>

                <div class="info-biometrico">
                    <p class="info-biometrico__texto">
                        La foto se usará para el reconocimiento facial en la entrada.
                        Se recomienda fondo claro y buena iluminación.
                    </p>
                    <div id="estadoBiometrico" class="info-biometrico__estado">
                        <span class="estado-punto estado-punto--gris"></span>
                        Sin captura biométrica
                    </div>
                </div>
            </div>
        </div>

        <div class="formulario-acciones">
            <button type="submit" class="btn btn--primario">Registrar Persona</button>
            <a th:href="@{/menu}" class="btn btn--secundario">Cancelar</a>
        </div>
    </form>
</main>

<footer th:replace="~{fragmentos/base :: pie}"></footer>

<script th:src="@{/js/camara.js}"></script>
<script th:src="@{/js/registro.js}"></script>

</body>
</html>
